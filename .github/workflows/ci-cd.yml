name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/flask-app

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install deps
      run: pip install -r app/requirements.txt pytest
    - name: Basic smoke test
      run: |
        cd app
        python -c "import app; print('Import OK')"

  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=,format=short
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gfp,scope=main   # Layer cache speeds up rebuilds

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Update image tag in manifest
      run: |
        sed -i "s|YOUR_DOCKERHUB_USER/flask-app:latest|${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}|g" k8s/flask-deployment.yaml
    - name: Show updated manifest (audit trail)
      run: grep "image:" k8s/flask-deployment.yaml
    - name: Deploy note
      run: |
        echo "In production: kubectl apply -f k8s/ --namespace fluidai-demo"
        echo "Rolling out image: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
        echo "Verify with: kubectl rollout status deployment/flask-app -n infra-demo"
